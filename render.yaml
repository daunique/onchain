services:
  - type: worker
    name: onchain-sentinel
    runtime: python
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ALCHEMY_API_KEY
        sync: false
      - key: ALCHEMY_WS_URL
        sync: false
      - key: ALCHEMY_HTTP_URL
        sync: false
      - key: ALCHEMY_BASE_WS_URL
        sync: false
      - key: ALCHEMY_BASE_HTTP_URL
        sync: false
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: SCAN_INTERVAL_MINUTES
        value: "10"
      - key: MIN_PRICE_CHANGE_PCT
        value: "15"
      - key: MAX_TOKENS_TO_SCAN
        value: "50"
      - key: MAX_MARKET_CAP_USD
        value: "20000000"
      - key: MIN_CLUSTER_SIZE
        value: "2"
      - key: GAS_FUZZY_TOLERANCE_PCT
        value: "5"
      - key: FANOUT_WINDOW_SECONDS
        value: "300"
      - key: MIN_CONFIDENCE_TO_ALERT
        value: "medium"
      - key: DASHBOARD_PORT
        value: "5000"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.0"
